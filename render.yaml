services:
  # Web Service
  - type: web
    name: 3s-smart-solution
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: 3s-database
          property: connectionString

  # PostgreSQL Database
  - type: pgsql
    name: 3s-database
    plan: free
    databaseName: sss_db
    user: sss_admin
